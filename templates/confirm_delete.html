<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Delete</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .confirm-box {
            background: white;
            padding: 2.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
            max-width: 420px;
            text-align: center;
        }
        .confirm-box h2 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .confirm-box p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        .confirm-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .btn-danger {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 0.65rem 1.5rem;
            border-radius: 0.375rem;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn-danger:hover { background-color: #b91c1c; }
        .btn-cancel {
            background-color: transparent;
            border: 1px solid #e2e8f0;
            color: #334155;
            padding: 0.65rem 1.5rem;
            border-radius: 0.375rem;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .btn-cancel:hover { background-color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="confirm-box">
        <h2>Delete Vehicle Record?</h2>
        <p>
            Are you sure you want to delete <strong>{{ vehicle.vehicle_model }}</strong>
            ({{ vehicle.license_plate }})? This cannot be undone.
        </p>
        <div class="confirm-actions">
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn-danger">Yes, Delete</button>
            </form>
            <a href="{% url 'vehicleview' %}" class="btn-cancel">Cancel</a>
        </div>
    </div>
</body>
</html>
